user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Las paginas HTML del sitio deben existir realmente.
        # Si no existen, devolvemos 404 en vez de mostrar index.html y ocultar el problema.
        location ~* \.html$ {
            try_files $uri =404;
            expires -1;
            add_header Cache-Control "no-store";
        }

        # En desarrollo evitamos cachear JS y CSS para no ejecutar versiones viejas.
        location ~* \.(js|css)$ {
            try_files $uri =404;
            expires -1;
            add_header Cache-Control "no-store";
        }

        # Servir archivos estáticos del frontend
        location / {
            try_files $uri $uri/ =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Proxy a la API del backend Laravel
        location /api/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
        }

        # Proxy para rutas de Artisan (ej. /admin que gestiona Laravel si existe)
        location /admin/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Archivos estáticos
        location /static/ {
            proxy_pass http://app:8000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Media files
        location /media/ {
            proxy_pass http://app:8000;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Error pages
        error_page 500 502 503 504 /error.html;
    }
}
