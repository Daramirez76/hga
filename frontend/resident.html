<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HGA - Residentes</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/hga-home-shell.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #e8f5e9 0%, #b2dfdb 50%, #e0f2f1 100%);
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
            radial-gradient(circle at 20% 50%, rgba(129, 199, 132, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(77, 182, 172, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 40% 20%, rgba(174, 213, 129, 0.1) 0%, transparent 50%);
        filter: blur(60px);
        z-index: 0;
        pointer-events: none;
      }

      .top-bar,
      .panel-residentes {
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      }

      .top-bar {
        border-radius: 1.8rem;
      }

      .brand-logo {
        width: 58px;
        height: 58px;
        object-fit: cover;
      }

      .brand-link {
        display: inline-flex;
        align-items: center;
        gap: 1rem;
        text-decoration: none;
      }

      .brand-title {
        margin: 0;
        color: #33bdd2;
        font-size: clamp(1.4rem, 2vw, 2rem);
        font-weight: 400;
      }

      .header-actions .btn {
        align-items: center;
        background: transparent;
        border: none;
        border-radius: 50%;
        color: #1f1f1f;
        display: inline-flex;
        height: 42px;
        justify-content: center;
        padding: 0;
        width: 42px;
      }

      .header-actions .btn:hover,
      .header-actions .btn:focus {
        background: rgba(77, 182, 172, 0.12);
      }

      .menu-trigger {
        color: #33bdd2;
      }

      /* Main content */
      main {
        position: relative;
        z-index: 1;
      }

      /* Panel residentes mejorado */
      .panel-residentes {
        background: rgba(255, 255, 255, 0.98) !important;
        backdrop-filter: blur(15px);
        border-radius: 25px !important;
        border: none !important;
      }

      .tab-residentes {
        background: linear-gradient(135deg, #66bb6a, #4db6ac);
        color: white !important;
        border-radius: 12px !important;
        display: inline-block;
        padding: 10px 20px !important;
        margin-top: 0 !important;
        font-weight: 600;
        font-size: 14px;
      }

      .residentes-card {
        display: grid;
        gap: 0.55rem;
      }

      .residentes-card-title {
        color: #2e7257;
        font-size: 1.1rem;
        font-weight: 500;
        padding-left: 0.15rem;
      }

      /* Bloque residente mejorado */
      .bloque-residente {
        background: linear-gradient(180deg, #d8eee0 0%, #d2ead9 100%) !important;
        border-radius: 18px !important;
        border: 1px solid rgba(123, 190, 154, 0.75) !important;
        padding: 18px 22px 22px !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
      }

      /* Inputs mejorados */
      .form-control {
        border: 1px solid rgba(110, 194, 151, 0.95) !important;
        border-radius: 10px !important;
        padding: 14px 16px !important;
        font-size: 15px;
        min-height: 52px;
        transition: all 0.25s ease;
        background: rgba(255, 255, 255, 0.98) !important;
        color: #2c3e37 !important;
        box-shadow: 0 3px 8px rgba(33, 76, 60, 0.06);
      }

      .form-control:focus {
        outline: none;
        border-color: #59bc7b !important;
        box-shadow: 0 0 0 3px rgba(89, 188, 123, 0.12) !important;
      }

      .form-label {
        color: #2b7a5c;
        font-weight: 500;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .label-sm {
        font-size: 0.95rem;
        color: #2b7a5c !important;
      }

      /* Botón gestionar mejorado */
      .btn-gestionar {
        background: linear-gradient(135deg, #66bb6a, #4db6ac);
        border: none !important;
        color: white !important;
        font-weight: 600;
        border-radius: 12px !important;
        padding: 12px 25px !important;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(102, 187, 106, 0.3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .btn-gestionar:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 187, 106, 0.4);
        color: white;
      }

      /* Footer */
      .footer {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.95) !important;
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(200, 230, 201, 0.5) !important;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
      }

      .footer small {
        color: #2e7d32;
      }

      .profile-menu-wrapper {
        position: relative;
      }

      .profile-menu-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .profile-dropdown {
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        min-width: 220px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(200, 230, 201, 0.8);
        border-radius: 14px;
        box-shadow: 0 12px 24px rgba(46, 125, 50, 0.15);
        overflow: hidden;
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 10;
      }

      .profile-dropdown.show {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .profile-menu-item {
        width: 100%;
        border: 0;
        background: transparent;
        color: #2e7d32;
        text-align: left;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 500;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .profile-menu-item:hover {
        background: linear-gradient(135deg, #e8f5e9, #d9f0ee);
        color: #1b5e20;
      }

      .profile-menu-item + .profile-menu-item {
        border-top: 1px solid rgba(200, 230, 201, 0.7);
      }

      .residentes-toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .btn-secundario {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(102, 187, 106, 0.28) !important;
        color: #2e7d32 !important;
        font-weight: 600;
        border-radius: 12px !important;
        padding: 12px 20px !important;
        transition: all 0.3s;
      }

      .btn-secundario:hover {
        background: #f4fbf6 !important;
        color: #1b5e20 !important;
        transform: translateY(-1px);
      }

      .residentes-grid {
        display: grid;
        gap: 18px;
      }

      .residentes-empty {
        background: rgba(77, 182, 172, 0.08);
        border: 1px dashed rgba(77, 182, 172, 0.45);
        border-radius: 14px;
        color: #2f6b66;
        padding: 18px;
        text-align: center;
      }

      .residentes-actions {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 14px;
      }

      .residentes-delete-btn {
        border: 0;
        background: rgba(255, 255, 255, 0.88);
        color: #b42318;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.82rem;
        padding: 8px 14px;
        box-shadow: 0 4px 10px rgba(180, 35, 24, 0.08);
      }

      .residentes-delete-btn:hover {
        background: rgba(255, 255, 255, 1);
      }

      .residentes-fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 18px;
      }

      .residentes-field {
        min-width: 0;
      }

      .residentes-field.full-width {
        grid-column: 1 / -1;
      }

      .residentes-helper {
        color: #4d6b62;
        font-size: 0.82rem;
        margin-top: 6px;
      }

      .residentes-modal-backdrop {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(14, 24, 22, 0.52);
        backdrop-filter: blur(3px);
        z-index: 1100;
      }

      .residentes-modal-backdrop.show {
        display: flex;
      }

      .residentes-modal-card {
        width: min(100%, 460px);
        background: rgba(255, 255, 255, 0.98);
        border-radius: 22px;
        box-shadow: 0 28px 60px rgba(15, 23, 42, 0.18);
        overflow: hidden;
      }

      .residentes-modal-header {
        background: linear-gradient(135deg, #e8f5e9, #cdeee4 55%, #bfe7d4);
        color: #2e7d32;
      }

      .residentes-modal-copy {
        color: #445a57;
      }

      .residentes-modal-btn {
        border-radius: 12px !important;
        font-weight: 600;
        padding: 10px 18px !important;
      }

      .residentes-modal-confirm {
        background: #c62828 !important;
        border: none !important;
        color: white !important;
      }

      .residentes-modal-confirm:hover {
        background: #b71c1c !important;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .panel-residentes {
          padding: 20px !important;
        }

        .btn-gestionar {
          font-size: 14px;
          padding: 10px 16px !important;
        }

        .top-bar {
          border-radius: 1.4rem;
        }

        .residentes-fields {
          grid-template-columns: 1fr;
        }
      }

    </style>
  </head>
  <body class="hga-home-theme d-flex flex-column min-vh-100" data-allowed-roles="1,2,4" data-login-page="login.html">
    <header class="container py-4 py-lg-5">
      <div class="top-bar hga-top-bar px-3 px-lg-4 py-3">
        <div class="d-flex align-items-center justify-content-between gap-3">
          <a href="home.html" class="brand-link">
            <img src="./img/LOGO_HGA.png" alt="Logo HGA" class="brand-logo rounded-circle" />
            <h1 class="brand-title">Residentes</h1>
          </a>

          <div class="header-actions d-flex align-items-center gap-2">
            <button class="btn" type="button" aria-label="Notificaciones" title="Notificaciones">
              <i class="bi bi-bell"></i>
            </button>

            <div class="profile-menu-wrapper">
              <button class="btn profile-menu-btn" id="profileMenuButton" aria-label="Perfil" title="Perfil" aria-haspopup="true" aria-expanded="false">
                <i class="bi bi-person-circle"></i>
              </button>
              <div class="profile-dropdown" id="profileDropdown">
                <button class="profile-menu-item" type="button" id="viewUserProfile">Ver perfil de usuario</button>
                <button class="profile-menu-item" type="button" id="logoutUser">Cerrar sesión</button>
              </div>
            </div>

            <button class="btn menu-trigger" type="button" aria-label="Menú" title="Menú">
              <i class="bi bi-list"></i>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="flex-grow-1 hga-main-region">
      <div class="container py-5">
        <div class="residentes-toolbar">
          <button type="button" class="btn btn-secundario" id="agregarResidente">Agregar residente</button>
          <button type="submit" form="formResidentes" class="btn btn-gestionar" id="guardarResidentes">Gestionar Residentes</button>
        </div>

        <form class="panel-residentes hga-surface-panel p-4 p-md-5" id="formResidentes">
          <div class="residentes-grid" id="residentesContainer"></div>
        </form>
      </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-4 footer hga-footer-strip">
      <div class="container text-center">
        <small class="text-muted">derechos reservados HGA &copy; 2025 | Hogar Geriátrico</small>
      </div>
    </footer>

    <div class="residentes-modal-backdrop" id="residentesDeleteModal" aria-hidden="true">
      <div class="residentes-modal-card">
        <div class="residentes-modal-header px-4 py-4">
          <h2 class="h4 mb-2">¿Eliminar residente?</h2>
          <p class="mb-0">Esta acción no se puede deshacer.</p>
        </div>
        <div class="px-4 py-4">
          <p class="residentes-modal-copy mb-4" id="residentesDeleteMessage">
            ¿Estás seguro de que quieres eliminar este residente?
          </p>
          <div class="d-flex justify-content-end gap-2 flex-wrap">
            <button type="button" class="btn btn-secundario residentes-modal-btn" id="residentesDeleteCancel">Cancelar</button>
            <button type="button" class="btn residentes-modal-btn residentes-modal-confirm" id="residentesDeleteConfirm">Eliminar</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/alerts.js"></script>
    <script src="./js/role_access.js"></script>
    <script src="./js/menu_notificacion.js"></script>
    <script src="./js/menu_usuario.js"></script>
    <script src="./js/menu_desplegable.js"></script>
    <script src="./js/resident_validate.js"></script>
  </body>
</html>
