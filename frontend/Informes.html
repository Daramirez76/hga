<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Informes</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />

    <style>
      body {
        background: linear-gradient(135deg, #8fc5c5, #6fb1b1);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* LOGO */
      .logo-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
      }

      /* HEADER */
      .header {
        background: #eaeaea;
        border-radius: 30px;
        padding: 10px 20px;
        margin: 20px auto;
        max-width: 1000px;
        width: 95%;
      }

      /* CONTENEDOR PRINCIPAL */
      .container-main {
        background: #f3f3f3;
        border-radius: 25px;
        padding: 25px;
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
      }

      /* PANEL INFORMES */
      .panel-informes {
        background: #b3ddbf;
        border-radius: 20px;
        padding: 20px;
      }

      /* BOTON NUEVO INFORME */
      .btn-nuevo-container {
        margin: 0 0 15px 50px;
      }

      .btn-nuevo {
        border-radius: 20px;
        background: #417c55;
        color: white;
        border: none;
        padding: 8px 20px;
      }

      .btn-nuevo:hover {
        background: #3ccc78;
        color: white;
      }

      .informes-summary {
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(65, 124, 85, 0.15);
        border-radius: 18px;
        padding: 12px 16px;
      }

      .informes-banner {
        border-radius: 16px;
        border: 1px solid rgba(65, 124, 85, 0.15);
        background: rgba(255, 255, 255, 0.8);
        color: #2e7d32;
      }

      .informe-card {
        border: 1px solid rgba(65, 124, 85, 0.12);
        border-radius: 16px;
        background: linear-gradient(180deg, #ffffff, #f8fcf9);
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 8px 20px rgba(46, 125, 50, 0.06);
      }

      .informe-card-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .informe-code {
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #5c7d66;
      }

      .informe-title {
        color: #166e34;
        margin: 0;
      }

      .informe-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .informe-chip {
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 600;
        background: #e8f5e9;
        color: #1b5e20;
      }

      .informe-chip.type {
        background: #e3f2fd;
        color: #0d47a1;
      }

      .informe-chip.urgency-normal {
        background: #fff8e1;
        color: #8d6e63;
      }

      .informe-chip.urgency-alta {
        background: #ffebee;
        color: #b71c1c;
      }

      .informe-description {
        margin: 12px 0 0;
        color: #4b5c50;
      }

      .informe-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .informe-actions .btn {
        border-radius: 999px;
      }

      .empty-state-informes {
        background: rgba(255, 255, 255, 0.75);
        border: 1px dashed rgba(65, 124, 85, 0.25);
        border-radius: 16px;
        color: #4b5c50;
        padding: 18px;
        text-align: center;
      }

      /* BOTON CONFIRMAR */
      .btn-confirmar {
        background: #5fbf7f;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 8px;
      }

      .btn-confirmar:hover {
        background: #4da86a;
        color: white;
      }

      /* FOOTER */
      footer {
        background: #eaeaea;
        padding: 12px;
        text-align: center;
        margin-top: auto;
      }

      /* BOTONES NOTIFICACION Y PERFIL */
      .btn-outline-secondary {
        color: #2e7d32 !important;
        border-color: #c8e6c9 !important;
        transition: all 0.3s;
      }

      .btn-outline-secondary:hover {
        background: linear-gradient(135deg, #e8f5e9, #c8e6c9) !important;
        border-color: #66bb6a !important;
        color: #2e7d32 !important;
      }

      /* MENU PERFIL */
      .profile-menu-wrapper {
        position: relative;
      }

      .profile-menu-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .profile-dropdown {
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        min-width: 220px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(200, 230, 201, 0.8);
        border-radius: 14px;
        box-shadow: 0 12px 24px rgba(46, 125, 50, 0.15);
        overflow: hidden;
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
        z-index: 10;
      }

      .profile-dropdown.show {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .profile-menu-item {
        width: 100%;
        border: 0;
        background: transparent;
        color: #2e7d32;
        text-align: left;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 500;
        transition:
          background-color 0.2s ease,
          color 0.2s ease;
      }

      .profile-menu-item:hover {
        background: linear-gradient(135deg, #e8f5e9, #d9f0ee);
        color: #1b5e20;
      }

      .profile-menu-item + .profile-menu-item {
        border-top: 1px solid rgba(200, 230, 201, 0.7);
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .container-main {
          max-width: 95%;
          padding: 20px;
        }
        .btn-nuevo-container {
          margin-left: 20px;
        }
      }

      @media (max-width: 480px) {
        .header {
          border-radius: 15px;
          padding: 8px 12px;
        }
        .container-main {
          padding: 15px;
          border-radius: 20px;
        }
        .panel-informes {
          padding: 15px;
        }
        .btn-nuevo-container {
          margin-left: 15px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ==================== HEADER ==================== -->
    <div class="header d-flex justify-content-between align-items-center">
      <!-- IZQUIERDA -->
      <div class="d-flex align-items-center gap-2">
        <img
          src="img/LOGO_HGA.png"
          class="rounded-circle logo-img"
          alt="Logo"
        />
        <button
          class="btn btn-link text-decoration-none text-primary fw-bold"
          onclick="location.reload()"
        >
          Informes
        </button>
      </div>

      <!-- DERECHA -->
      <div class="d-flex align-items-center gap-2">
        <!-- NOTIFICACIONES -->
        <button
          class="btn btn-outline-secondary rounded-circle"
          aria-label="Notificaciones"
          title="Notificaciones"
        >
          🔔
        </button>

        <!-- PERFIL -->
        <div class="profile-menu-wrapper">
          <button
            class="btn btn-outline-secondary rounded-circle profile-menu-btn"
            id="profileMenuButton"
            aria-label="Perfil"
            title="Perfil"
            aria-haspopup="true"
            aria-expanded="false"
          >
            👤
          </button>
          <div class="profile-dropdown" id="profileDropdown">
            <button
              class="profile-menu-item"
              type="button"
              id="viewUserProfile"
            >
              Ver perfil de usuario
            </button>
            <button class="profile-menu-item" type="button" id="logoutUser">
              Cerrar sesión
            </button>
          </div>
        </div>

        <!-- MENU -->
        <button
          class="btn btn-outline-secondary rounded-circle"
          type="button"
          aria-label="Menú"
          title="Menú"
          data-menu-hamburguesa
        >
          ☰
        </button>
      </div>
      <!-- fin derecha -->
    </div>
    <!-- fin header -->

    <!-- ==================== BOTON NUEVO INFORME ==================== -->
    <div class="btn-nuevo-container">
      <button id="btnNuevoInforme" class="btn btn-light btn-nuevo">
        + Nuevo informe
      </button>
    </div>

    <!-- ==================== CONTENIDO ==================== -->
    <div class="container-main">
      <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap mb-3">
        <div>
          <h5 class="text-success mb-1">Historial de Informes</h5>
          <p class="mb-0 text-muted" id="informesContext">Cargando contexto de sesión...</p>
        </div>
        <div class="informes-summary d-flex gap-2 flex-wrap">
          <span class="badge text-bg-light border" id="informesCountBadge">0 informes</span>
          <span class="badge text-bg-light border" id="residentesCountBadge">0 residentes</span>
        </div>
      </div>

      <div id="informesBanner" class="informes-banner alert d-none mb-3" role="status" aria-live="polite"></div>

      <div class="panel-informes">
        <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
          <input
            type="text"
            id="searchInformes"
            class="form-control"
            style="max-width: 280px"
            placeholder="Buscar por título, residente o código"
          />
          <button class="btn btn-light" id="btnLimpiarFiltro">Limpiar filtro</button>
        </div>

        <!-- LISTA DE INFORMES -->
        <div id="listaInformesContainer"></div>
      </div>
    </div>

    <!-- ==================== FOOTER ==================== -->
    <footer>derechos reservados HGA © 2025 | Hogar Geriátrico</footer>

    <!-- ==================== MODAL INFORME ==================== -->
    <div class="modal fade" id="modalInforme" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <h5 class="modal-title mb-1" id="modalInformeTitle">Nuevo informe</h5>
              <small class="text-muted" id="modalInformeSubtitle">Registra un informe usando datos reales del sistema.</small>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <form id="formInforme" autocomplete="off">
              <div class="mb-3">
                <label class="form-label">Código del informe</label>
                <input id="inputInformeCodigo" class="form-control" type="text" readonly placeholder="Lo asigna el sistema" />
              </div>
              <div class="mb-3">
                <label class="form-label">Residente</label>
                <select id="inputInformeResidente" class="form-select" required>
                  <option value="">Cargando residentes...</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Título</label>
                <input id="inputInformeTitulo" class="form-control" type="text" maxlength="255" required placeholder="Título del informe" />
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Tipo</label>
                  <select id="inputInformeTipo" class="form-select">
                    <option value="general">General</option>
                    <option value="seguimiento">Seguimiento</option>
                    <option value="incidencia">Incidencia</option>
                    <option value="evaluacion">Evaluación</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Urgencia</label>
                  <select id="inputInformeUrgencia" class="form-select">
                    <option value="normal">Normal</option>
                    <option value="baja">Baja</option>
                    <option value="alta">Alta</option>
                  </select>
                </div>
              </div>
              <div class="mt-3 mb-2">
                <label class="form-label">Descripción</label>
                <textarea id="inputInformeDescripcion" class="form-control" rows="4" maxlength="500" placeholder="Observaciones, notas o resumen del informe"></textarea>
              </div>
              <div class="mt-3">
                <label class="form-label">Usuario autenticado</label>
                <input id="inputInformeAutor" class="form-control" type="text" readonly />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="formInforme" class="btn btn-confirmar" id="btnGuardarInforme">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/alerts.js"></script>
    <script src="./js/menu_notificacion.js"></script>
    <script src="./js/menu_usuario.js"></script>
    <script src="./js/menu_desplegable.js"></script>
    <script src="./js/informes.js"></script>
  </body>
</html>
