<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Informes</title>
    <script src="./js/access_bootstrap.js" data-allowed-roles="1,2" data-login-page="login_employees.html"></script>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/hga-home-shell.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

    <style>
      body {
        min-height: 100vh;
      }

      .container-main {
        background: var(--hga-surface);
        border-radius: var(--hga-radius-xl);
        box-shadow: var(--hga-shadow);
        padding: 1.5rem;
        width: 100%;
        max-width: none;
        margin: 0;
      }

      .panel-informes {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(233, 246, 242, 0.98));
        border: 1px solid rgba(41, 156, 76, 0.18);
        border-radius: 1.6rem;
        padding: 1.25rem;
      }

      .btn-nuevo-container {
        margin: 0 0 1rem;
      }

      .btn-nuevo {
        border-radius: 999px;
        background: linear-gradient(135deg, var(--hga-primary), var(--hga-secondary));
        color: white;
        border: none;
        padding: 0.8rem 1.3rem;
        box-shadow: 0 12px 20px rgba(41, 156, 76, 0.18);
      }

      .btn-nuevo:hover {
        color: white;
        filter: brightness(1.03);
      }

      .informes-summary {
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(65, 124, 85, 0.15);
        border-radius: 18px;
        padding: 12px 16px;
      }

      .informes-banner {
        border-radius: 16px;
        border: 1px solid rgba(65, 124, 85, 0.15);
        background: rgba(255, 255, 255, 0.8);
        color: #2e7d32;
      }

      .informe-card {
        border: 1px solid rgba(65, 124, 85, 0.12);
        border-radius: 16px;
        background: linear-gradient(180deg, #ffffff, #f8fcf9);
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 8px 20px rgba(46, 125, 50, 0.06);
      }

      .informe-card-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .informe-code {
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #5c7d66;
      }

      .informe-title {
        color: #166e34;
        margin: 0;
      }

      .informe-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .informe-chip {
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 600;
        background: #e8f5e9;
        color: #1b5e20;
      }

      .informe-chip.type {
        background: #e3f2fd;
        color: #0d47a1;
      }

      .informe-chip.urgency-normal {
        background: #fff8e1;
        color: #8d6e63;
      }

      .informe-chip.urgency-alta {
        background: #ffebee;
        color: #b71c1c;
      }

      .informe-description {
        margin: 12px 0 0;
        color: #4b5c50;
      }

      .informe-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .informe-actions .btn {
        border-radius: 999px;
      }

      .empty-state-informes {
        background: rgba(255, 255, 255, 0.75);
        border: 1px dashed rgba(65, 124, 85, 0.25);
        border-radius: 16px;
        color: #4b5c50;
        padding: 18px;
        text-align: center;
      }

      /* BOTON CONFIRMAR */
      .btn-confirmar {
        background: #5fbf7f;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 8px;
      }

      .btn-confirmar:hover {
        background: #4da86a;
        color: white;
      }

      .profile-menu-wrapper {
        position: relative;
      }

      .dropdown-menu .dropdown-item {
        padding: 10px 20px;
        font-weight: 500;
        color: #2e7d32;
        transition: all 0.2s ease;
      }

      .dropdown-menu .dropdown-item:hover {
        background: linear-gradient(135deg, #e8f5e9, #d9f0ee);
        color: #1b5e20;
        transform: translateX(5px);
      }

      /* Perfil dropdown */
      .profile-dropdown {
        border-radius: 14px;
        box-shadow: 0 12px 24px rgba(46, 125, 50, 0.15);
        transition: all 0.3s ease;
      }

      .profile-dropdown .profile-menu-item {
        padding: 12px 20px;
        font-weight: 500;
        color: #2e7d32;
        transition: all 0.2s ease;
      }

      .profile-dropdown .profile-menu-item:hover {
        background: linear-gradient(135deg, #e8f5e9, #d9f0ee);
        color: #1b5e20;
        transform: translateX(5px);
      }

      /* Animaciones al mostrar dropdowns */
      .dropdown-menu,
      .profile-dropdown {
        opacity: 0;
        transform: translateY(-5px) scale(0.98);
        pointer-events: none;
      }

      .dropdown-menu.show,
      .profile-dropdown.show {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @media (max-width: 768px) {
        .btn-nuevo-container {
          margin-bottom: 0.85rem;
        }
      }

      @media (max-width: 480px) {
        .container-main {
          padding: 1rem;
        }
        .panel-informes {
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body class="hga-home-theme" data-allowed-roles="1,2" data-login-page="login_employees.html">
    <div class="hga-page-shell">
      <header class="hga-top-region">
        <div class="hga-content-shell">
          <div class="hga-top-bar">
            <div class="hga-top-bar-inner">
              <a href="Informes.html" class="hga-brand-link">
                <img src="img/LOGO_HGA.png" class="hga-brand-logo" alt="Logo" />
                <h1 class="hga-brand-title">Informes</h1>
              </a>

              <div class="hga-icon-actions">
                <button class="hga-icon-btn" aria-label="Notificaciones" title="Notificaciones">
                  <i class="bi bi-bell"></i>
                </button>

                <div class="profile-menu-wrapper">
                  <button class="hga-icon-btn" id="profileMenuButton" aria-label="Perfil" title="Perfil" aria-haspopup="true" aria-expanded="false">
                    <i class="bi bi-person-circle"></i>
                  </button>
                  <div class="profile-dropdown" id="profileDropdown">
                    <button class="profile-menu-item" type="button" id="viewUserProfile">Ver perfil de usuario</button>
                    <button class="profile-menu-item" type="button" id="logoutUser">Cerrar sesión</button>
                  </div>
                </div>

                <button class="hga-icon-btn is-menu" type="button" aria-label="Menú" title="Menú" data-menu-hamburguesa>
                  <i class="bi bi-list"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="hga-main-region">
        <div class="hga-content-shell">
          <div class="btn-nuevo-container">
            <button id="btnNuevoInforme" class="btn btn-light btn-nuevo">
              + Nuevo informe
            </button>
          </div>

          <div class="container-main">
      <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap mb-3">
        <div>
          <h2 class="hga-section-title">Historial de informes</h2>
          <p class="mb-0 text-muted" id="informesContext">Cargando contexto de sesión...</p>
        </div>
        <div class="informes-summary d-flex gap-2 flex-wrap">
          <span class="badge text-bg-light border" id="informesCountBadge">0 informes</span>
          <span class="badge text-bg-light border" id="residentesCountBadge">0 residentes</span>
        </div>
      </div>

      <div id="informesBanner" class="informes-banner alert d-none mb-3" role="status" aria-live="polite"></div>

      <div class="panel-informes">
        <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
          <input
            type="text"
            id="searchInformes"
            class="form-control"
            style="max-width: 280px"
            placeholder="Buscar por título, descripción, urgencia, tipo o residente"
          />
          <button class="btn btn-light" id="btnLimpiarFiltro">Limpiar filtro</button>
        </div>

        <!-- LISTA DE INFORMES -->
        <div id="listaInformesContainer"></div>
      </div>
          </div>
        </div>
      </main>

      <footer class="hga-footer-strip">derechos reservados HGA © 2025 | Hogar Geriátrico</footer>
    </div>

    <!-- ==================== MODAL INFORME ==================== -->
    <div class="modal fade" id="modalInforme" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <h5 class="modal-title mb-1" id="modalInformeTitle">Nuevo informe</h5>
              <small class="text-muted" id="modalInformeSubtitle">Registra un informe usando datos reales del sistema.</small>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <form id="formInforme" autocomplete="off">
              <div class="mb-3">
                <label class="form-label">Código del informe</label>
                <input id="inputInformeCodigo" class="form-control" type="text" readonly placeholder="Lo asigna el sistema" />
              </div>
              <div class="mb-3">
                <label class="form-label">Residente</label>
                <select id="inputInformeResidente" class="form-select" required>
                  <option value="">Cargando residentes...</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Título</label>
                <input id="inputInformeTitulo" class="form-control" type="text" maxlength="255" required placeholder="Título del informe" />
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Tipo</label>
                  <select id="inputInformeTipo" class="form-select">
                    <option value="general">General</option>
                    <option value="seguimiento">Seguimiento</option>
                    <option value="incidencia">Incidencia</option>
                    <option value="evaluacion">Evaluación</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Urgencia</label>
                  <select id="inputInformeUrgencia" class="form-select">
                    <option value="normal">Normal</option>
                    <option value="baja">Baja</option>
                    <option value="alta">Alta</option>
                  </select>
                </div>
              </div>
              <div class="mt-3 mb-2">
                <label class="form-label">Descripción</label>
                <textarea id="inputInformeDescripcion" class="form-control" rows="4" maxlength="500" placeholder="Observaciones, notas o resumen del informe"></textarea>
              </div>
              <div class="mt-3">
                <label class="form-label">Usuario autenticado</label>
                <input id="inputInformeAutor" class="form-control" type="text" readonly />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="formInforme" class="btn btn-confirmar" id="btnGuardarInforme">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/alerts.js"></script>
    <script src="./js/role_access.js"></script>
    <script src="./js/hga_pagination.js"></script>
    <script src="./js/menu_notificacion.js"></script>
    <script src="./js/menu_usuario.js"></script>
    <script src="./js/menu_desplegable.js"></script>
    <script src="./js/informes.js"></script>
  </body>
</html>
