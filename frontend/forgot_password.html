<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <style>
        :root {
            --hga-primary: #299c4c;
            --hga-secondary: #4db6ac;
            --hga-accent: #66bb6a;
            --hga-surface: #ffffff;
            --hga-bg-top: #94d7d1;
            --hga-bg-bottom: #e0f2f1;
            --hga-copy: rgba(93, 107, 102, 0.86);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, var(--hga-bg-top) 0%, #afe3de 42%, var(--hga-bg-bottom) 100%);
            color: #1f1f1f;
        }

        .page-shell {
            min-height: 100vh;
        }

        .top-bar,
        .recovery-card {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
        }

        .top-bar {
            border-radius: 1.8rem;
        }

        .brand-logo {
            width: 58px;
            height: 58px;
            object-fit: cover;
        }

        .recovery-shell {
            max-width: 620px;
            width: 100%;
        }

        .recovery-card {
            border-radius: 2rem;
        }

        .panel-title {
            color: var(--hga-primary);
            font-size: clamp(2rem, 3vw, 2.45rem);
            font-weight: 700;
            line-height: 1.2;
        }

        .panel-copy {
            color: var(--hga-copy);
            font-size: 1rem;
            line-height: 1.55;
        }

        .recovery-label {
            color: var(--hga-primary);
            font-size: 0.95rem;
            font-weight: 700;
        }

        .recovery-input,
        .recovery-input:focus {
            border: 1px solid rgba(41, 156, 76, 0.8);
            border-radius: 0.65rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.14);
            min-height: 42px;
        }

        .recovery-input:focus {
            box-shadow: 0 0 0 0.2rem rgba(77, 182, 172, 0.14), 0 4px 8px rgba(0, 0, 0, 0.14);
        }

        .helper-text {
            color: var(--hga-copy);
            font-size: 0.85rem;
        }

        .recovery-cta,
        .recovery-secondary {
            border-radius: 0.65rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.16);
            font-size: 0.875rem;
            font-weight: 700;
            min-height: 42px;
            text-transform: uppercase;
        }

        .recovery-cta {
            background: linear-gradient(90deg, var(--hga-accent), var(--hga-secondary));
            border: 1px solid var(--hga-primary);
            color: #fff;
        }

        .recovery-cta:hover,
        .recovery-cta:focus {
            background: linear-gradient(90deg, #5eb863, #44b0a4);
            color: #fff;
        }

        .recovery-secondary {
            background: linear-gradient(90deg, #ffffff, var(--hga-bg-bottom));
            border: 1px solid #ffffff;
            color: var(--hga-primary);
        }

        .recovery-secondary:hover,
        .recovery-secondary:focus {
            color: var(--hga-primary);
            background: linear-gradient(90deg, #f8fbfb, #d5ece8);
        }

        .status-message {
            display: none;
            border-radius: 0.9rem;
            margin-top: 1rem;
            padding: 0.9rem 1rem;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: rgba(76, 175, 80, 0.12);
            border: 1px solid rgba(76, 175, 80, 0.22);
            color: #1f6b2b;
        }

        .status-message.error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            color: #9f2432;
        }

        .footer-strip {
            background: rgba(255, 255, 255, 0.95);
        }

        @media (max-width: 991.98px) {
            .recovery-card {
                border-radius: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell d-flex flex-column">
        <header class="container py-4 py-lg-5">
            <div class="top-bar px-3 px-lg-4 py-3">
                <div class="d-flex align-items-center gap-3">
                    <a href="index.html" class="text-decoration-none">
                        <img src="./img/LOGO_HGA.png" alt="Logo HGA" class="brand-logo rounded-circle">
                    </a>
                </div>
            </div>
        </header>

        <main class="container flex-grow-1 pb-4 pb-lg-5">
            <section class="recovery-shell mx-auto">
                <div class="recovery-card px-4 px-md-5 py-4 py-md-5">
                    <h1 class="panel-title mb-3">Recuperar acceso</h1>
                    <p class="panel-copy mb-4">
                        Completa el formulario con tu correo electrónico para recibir un enlace
                        seguro de restablecimiento.
                    </p>

                    <form id="forgotPasswordForm" novalidate>
                        <div class="mb-4">
                            <label class="form-label recovery-label" for="email">Correo electrónico</label>
                            <input
                                id="email"
                                name="email"
                                type="email"
                                class="form-control recovery-input"
                                placeholder="Usuario@ejemplo.com"
                                autocomplete="email"
                                required
                            >
                            <div class="helper-text mt-2">Este campo es obligatorio</div>
                        </div>

                        <div class="row justify-content-center g-3 mt-2">
                            <div class="col-12 col-md-8">
                                <button id="submitButton" type="submit" class="btn recovery-cta w-100">
                                    Enviar enlace de recuperación
                                </button>
                            </div>
                            <div class="col-12 col-md-8">
                                <a id="backLink" href="login.html" class="btn recovery-secondary w-100">
                                    Volver al inicio de sesión
                                </a>
                            </div>
                        </div>
                    </form>

                    <div id="statusMessage" class="status-message" aria-live="polite"></div>
                </div>
            </section>
        </main>

        <footer class="footer-strip py-4 mt-auto">
            <div class="container text-center">
                <small class="fs-5">derechos reservados HGA © 2025 | Hogar Geriátrico</small>
            </div>
        </footer>
    </div>

    <script src="./js/forgot_password.js"></script>
    <script src="./js/chatbot.js"></script>
</body>
</html>
