<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitas</title>
   <link rel="stylesheet" href="./css/bootstrap.min.css">
  <style>
    body {
      background-color: #fff;
      font-family: Arial, sans-serif;
    }
    .navbar-custom {
      background-color: #fff;
      border-bottom: 1px solid #ddd;
    }
    .navbar-brand {
      background: #6EC1F2;
      padding: 8px 20px;
      border-radius: 20px 20px 20px 20px;
      font-weight: bold;
      font-size: 1.2rem;
      color: #000;
    }
    .card-visitas {
      background-color: #e0e0e0;
      border-radius: 40px;
      padding: 20px;
    }
    .mensaje {
      background-color: #6DE6F8;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .form-visita {
      background-color: #6DE6F8;
      border-radius: 30px;
      padding: 20px;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    }
    .btn-confirmar {
      background-color: #b5f264;
      font-weight: bold;
      color: #000;
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-custom px-4">
     <a class="navbar-brand" href="Visitas.html">Visitas</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-4">
         <a href="#" class="nav-link"><button class="btn btn-end">Notificaciones</button></a>
         <a href="#" class="nav-link"><button class="btn btn-end">Informes</button></a>
         <a href="#" class="nav-link"><button class="btn btn-end">Reuniones</button></a>
      </ul>
    </div>
    <div class="d-flex gap-3">
      <i class="bi bi-bell fs-5"></i>
      <i class="bi bi-person-circle fs-5"></i>
    </div>
  </nav>

  <div class="container-fluid mt-4">
    <div class="row">
      
      <!-- Lista de Visitas -->
      <div class="col-md-8">
        <div class="card-visitas">
          <h4 class="fw-bold mb-4"><i class="bi bi-house-door"></i> Visitas Registradas</h4>
          
          <div id="listaVisitasContainer">
            <!-- Las visitas se cargarán aquí de forma dinámica -->
          </div>
        </div>
      </div>

      <!-- Formulario Nueva Visita -->
      <div class="col-md-4">
       <a href="#"><button class="btn btn-end"><h6 class="fw-bold">+Registrar Nueva Visita</h6></button></a>
        <div class="form-visita mt-2">
          <form id="formNuevaVisita">
            <div class="mb-2">
              <label class="form-label">Código Visita</label>
              <input type="number" class="form-control" id="codVisitas" placeholder="Ej: 1001" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Documento Visitante</label>
              <input type="number" class="form-control" id="docId" placeholder="Ej: 1234567890" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Nombre del Visitante</label>
              <input type="text" class="form-control" id="nombVisitante" placeholder="Nombre completo" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Código Residente</label>
              <input type="number" class="form-control" id="codResidente" placeholder="Código del residente" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Fecha Visita</label>
              <input type="date" class="form-control" id="fechaVisita" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Hora (Información)</label>
              <input type="time" class="form-control" id="hora" placeholder="Hora de visita">
            </div>
            <div class="mb-3">
              <label class="form-label">Código Usuario</label>
              <input type="number" class="form-control" id="codUsuario" placeholder="Tu código de usuario" required>
            </div>
            <button type="submit" class="btn btn-confirmar">Confirmar</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <!-- Script de gestión de visitas -->
  <script src=\"js/visitas.js\"></script>
</body>
</html>
