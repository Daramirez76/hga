<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f5e9 0%, #b2dfdb 50%, #e0f2f1 100%);
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(129, 199, 132, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(77, 182, 172, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(174, 213, 129, 0.1) 0%, transparent 50%);
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }

        header {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #66bb6a, #4db6ac);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .navbar-brand span {
            color: #2e7d32;
            font-weight: 600;
        }

        main {
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: none;
            padding: 32px;
            max-width: 560px;
            margin: 0 auto;
        }

        .form-card h2 {
            color: #2e7d32;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .form-card .subtitle {
            color: #5d6b66;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .form-label {
            color: #2e7d32;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #c8e6c9;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #66bb6a;
            box-shadow: 0 0 0 3px rgba(102, 187, 106, 0.12);
        }

        .form-text {
            color: #6b7280;
            font-size: 14px;
        }

        .btn-primary-custom,
        .btn-secondary-custom {
            width: 100%;
            border-radius: 12px;
            padding: 14px 18px;
            font-weight: 700;
            border: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, #66bb6a, #4db6ac);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 187, 106, 0.3);
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 187, 106, 0.4);
        }

        .btn-secondary-custom {
            background: linear-gradient(135deg, #f5f5f5, #e8f5e9);
            color: #2e7d32;
            border: 2px solid #c8e6c9;
        }

        .btn-secondary-custom:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        }

        .status-message {
            display: none;
            border-radius: 14px;
            padding: 14px 16px;
            margin-top: 18px;
            font-weight: 500;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: rgba(76, 175, 80, 0.12);
            color: #1f6b2b;
            border: 1px solid rgba(76, 175, 80, 0.2);
        }

        .status-message.error {
            background: rgba(220, 53, 69, 0.1);
            color: #9f2432;
            border: 1px solid rgba(220, 53, 69, 0.18);
        }

        .footer {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(200, 230, 201, 0.5);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
        }

        .footer small {
            color: #2e7d32;
        }

        @media (max-width: 991px) {
            .form-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <header class="py-3">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <a href="index.html" class="navbar-brand">
                    <div class="logo-icon">H</div>
                    <span>HGA</span>
                </a>
            </div>
        </div>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12">
                    <section class="form-card">
                        <h2>Solicitar recuperación</h2>
                        <p class="subtitle">
                            Completa el formulario con tu correo electrónico para solicitar el
                            restablecimiento de la contraseña.
                        </p>

                        <form id="forgotPasswordForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label" for="email">Correo electrónico</label>
                                <input
                                    id="email"
                                    name="email"
                                    type="email"
                                    class="form-control"
                                    placeholder="usuario@ejemplo.com"
                                    autocomplete="email"
                                    required
                                >
                                <div class="form-text">Este campo es obligatorio.</div>
                            </div>

                            <div class="d-grid gap-3 mt-4">
                                <button id="submitButton" type="submit" class="btn-primary-custom">
                                    Enviar solicitud
                                </button>
                                <a href="login.html" class="btn-secondary-custom text-decoration-none text-center">
                                    Regresar
                                </a>
                            </div>
                        </form>

                        <div id="statusMessage" class="status-message" aria-live="polite"></div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer py-3">
        <div class="container text-center">
            <small>derechos reservados HGA &copy; 2025</small>
        </div>
    </footer>

    <script src="js/forgot_password.js"></script>
</body>
</html>
